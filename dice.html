<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кости</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 15px; }
        .container { max-width: 500px; width: 100%; background: white; border-radius: 30px; padding: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        h1 { text-align: center; color: #333; margin-bottom: 20px; }
        .balance { text-align: center; font-size: 24px; font-weight: bold; color: #28a745; background: #f8f9fa; padding: 15px; border-radius: 15px; margin-bottom: 20px; }
        .dice-container { display: flex; justify-content: center; gap: 30px; margin: 40px 0; }
        .dice { width: 100px; height: 100px; background: white; border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 60px; box-shadow: 0 10px 20px rgba(0,0,0,0.2); transition: transform 0.5s; }
        .rolling { animation: roll 0.5s infinite; }
        @keyframes roll { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .bet-panel { background: #f8f9fa; padding: 20px; border-radius: 15px; }
        .current-bet { text-align: center; font-size: 18px; margin-bottom: 15px; }
        .current-bet span { font-size: 24px; font-weight: bold; color: #007bff; }
        .bet-buttons { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 15px; }
        .bet-btn { padding: 12px 0; background: #007bff; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .bet-btn.selected { background: #28a745; }
        .spin-btn { width: 100%; padding: 18px; background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); color: white; border: none; border-radius: 15px; font-size: 22px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .spin-btn:disabled { opacity: 0.5; }
        .result { text-align: center; font-size: 20px; margin-top: 20px; padding: 15px; border-radius: 15px; }
        .win { background: #d4edda; color: #155724; }
        .lose { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎲 КОСТИ</h1>
        <div class="balance">💰 Баланс: <span id="balance">1000</span></div>
        
        <div class="dice-container">
            <div class="dice" id="dice1">⚀</div>
            <div class="dice" id="dice2">⚀</div>
        </div>
        
        <div class="bet-panel">
            <div class="current-bet">Ставка: <span id="currentBet">50</span></div>
            <div class="bet-buttons">
                <button class="bet-btn" data-bet="10">10</button>
                <button class="bet-btn" data-bet="50">50</button>
                <button class="bet-btn" data-bet="100">100</button>
                <button class="bet-btn" data-bet="500">500</button>
                <button class="bet-btn" data-bet="1000">1000</button>
            </div>
            <button class="spin-btn" id="spinBtn">🎲 БРОСИТЬ</button>
        </div>
        <div id="result" class="result"></div>
    </div>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let balance = 1000;
        let currentBet = 50;
        let isRolling = false;

        const balanceEl = document.getElementById('balance');
        const currentBetEl = document.getElementById('currentBet');
        const dice1 = document.getElementById('dice1');
        const dice2 = document.getElementById('dice2');
        const spinBtn = document.getElementById('spinBtn');
        const resultEl = document.getElementById('result');

        const diceSymbols = ['⚀', '⚁', '⚂', '⚃', '⚄', '⚅'];

        document.querySelectorAll('.bet-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.bet-btn').forEach(b => b.classList.remove('selected'));
                this.classList.add('selected');
                currentBet = parseInt(this.dataset.bet);
                currentBetEl.textContent = currentBet;
            });
        });

        function getRandomDice() {
            return Math.floor(Math.random() * 6) + 1;
        }

        spinBtn.addEventListener('click', function() {
            if (isRolling) return;
            if (currentBet > balance) { alert('Недостаточно средств!'); return; }

            isRolling = true;
            spinBtn.disabled = true;
            resultEl.innerHTML = '';
            resultEl.className = 'result';
            
            dice1.classList.add('rolling');
            dice2.classList.add('rolling');

            balance -= currentBet;
            balanceEl.textContent = balance;

            setTimeout(() => {
                dice1.classList.remove('rolling');
                dice2.classList.remove('rolling');

                const d1 = getRandomDice();
                const d2 = getRandomDice();
                const sum = d1 + d2;

                dice1.textContent = diceSymbols[d1-1];
                dice2.textContent = diceSymbols[d2-1];

                let win = 0;
                let multiplier = 0;

                if (d1 === d2) {
                    multiplier = 3;
                    win = currentBet * 3;
                    resultEl.className = 'result win';
                    resultEl.innerHTML = `🎉 ДУБЛЬ! x3 = $${win}`;
                } else if (sum >= 8) {
                    multiplier = 2;
                    win = currentBet * 2;
                    resultEl.className = 'result win';
                    resultEl.innerHTML = `🎉 БОЛЬШАЯ СУММА! x2 = $${win}`;
                } else if (sum <= 5) {
                    multiplier = 1.5;
                    win = Math.floor(currentBet * 1.5);
                    resultEl.className = 'result win';
                    resultEl.innerHTML = `🎉 МАЛЕНЬКАЯ СУММА! x1.5 = $${win}`;
                } else {
                    resultEl.className = 'result lose';
                    resultEl.innerHTML = '😢 ПРОИГРЫШ';
                }

                if (win > 0) balance += win;
                balanceEl.textContent = balance;

                tg.sendData(JSON.stringify({
                    action: 'game_result',
                    game: 'dice',
                    bet: currentBet,
                    multiplier: multiplier,
                    win: win,
                    newBalance: balance
                }));

                isRolling = false;
                spinBtn.disabled = false;
            }, 1500);
        });

        document.querySelector('.bet-btn[data-bet="50"]').classList.add('selected');
    </script>
</body>
  </html>
