<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Колесо Фортуны</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 15px; }
        .container { max-width: 500px; width: 100%; background: white; border-radius: 30px; padding: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        h1 { text-align: center; color: #333; margin-bottom: 20px; }
        .balance { text-align: center; font-size: 24px; font-weight: bold; color: #28a745; background: #f8f9fa; padding: 15px; border-radius: 15px; margin-bottom: 20px; }
        .wheel-container { position: relative; width: 100%; aspect-ratio: 1; margin: 20px 0; }
        canvas { width: 100%; height: 100%; display: block; }
        .pointer { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); font-size: 40px; color: #FFD700; text-shadow: 0 2px 10px black; }
        .bet-panel { background: #f8f9fa; padding: 20px; border-radius: 15px; margin-top: 20px; }
        .current-bet { text-align: center; font-size: 18px; margin-bottom: 15px; }
        .current-bet span { font-size: 24px; font-weight: bold; color: #007bff; }
        .bet-buttons { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 15px; }
        .bet-btn { padding: 12px 0; background: #007bff; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .bet-btn.selected { background: #28a745; transform: scale(1.05); }
        .custom-bet { display: flex; gap: 10px; margin-bottom: 15px; }
        .custom-bet input { flex: 1; padding: 12px; border: 2px solid #ddd; border-radius: 10px; font-size: 16px; }
        .custom-bet button { padding: 12px 20px; background: #17a2b8; color: white; border: none; border-radius: 10px; font-weight: bold; }
        .spin-btn { width: 100%; padding: 18px; background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); color: white; border: none; border-radius: 15px; font-size: 22px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .spin-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .result { text-align: center; font-size: 20px; font-weight: bold; margin-top: 20px; padding: 15px; border-radius: 15px; }
        .win { background: #d4edda; color: #155724; }
        .lose { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎡 КОЛЕСО ФОРТУНЫ</h1>
        <div class="balance">💰 Баланс: <span id="balance">1000</span></div>
        <div class="wheel-container">
            <canvas id="wheel" width="400" height="400"></canvas>
            <div class="pointer">▼</div>
        </div>
        <div class="bet-panel">
            <div class="current-bet">Текущая ставка: <span id="currentBet">50</span></div>
            <div class="bet-buttons">
                <button class="bet-btn" data-bet="10">10</button>
                <button class="bet-btn" data-bet="50">50</button>
                <button class="bet-btn" data-bet="100">100</button>
                <button class="bet-btn" data-bet="500">500</button>
                <button class="bet-btn" data-bet="1000">1000</button>
            </div>
            <div class="custom-bet">
                <input type="number" id="customBet" placeholder="Своя ставка" min="10">
                <button id="setCustomBet">OK</button>
            </div>
            <button class="spin-btn" id="spinBtn">🎡 КРУТИТЬ</button>
        </div>
        <div id="result" class="result"></div>
    </div>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        let balance = 1000;
        let currentBet = 50;
        let isSpinning = false;

        const balanceEl = document.getElementById('balance');
        const currentBetEl = document.getElementById('currentBet');
        const canvas = document.getElementById('wheel');
        const ctx = canvas.getContext('2d');
        const spinBtn = document.getElementById('spinBtn');
        const resultEl = document.getElementById('result');

        const segments = [
            { color: '#FF6B6B', multiplier: 2, weight: 20 },
            { color: '#4ECDC4', multiplier: 1.5, weight: 25 },
            { color: '#FFE66D', multiplier: 0, weight: 15 },
            { color: '#FF9F1C', multiplier: 3, weight: 10 },
            { color: '#A8E6CF', multiplier: 1.2, weight: 20 },
            { color: '#FF8C42', multiplier: 5, weight: 5 },
            { color: '#D4A5A5', multiplier: 0.5, weight: 5 }
        ];

        function drawWheel(rotation = 0) {
            const angle = (Math.PI * 2) / segments.length;
            ctx.clearRect(0, 0, 400, 400);
            for (let i = 0; i < segments.length; i++) {
                const start = i * angle + rotation;
                const end = (i + 1) * angle + rotation;
                ctx.beginPath();
                ctx.moveTo(200, 200);
                ctx.arc(200, 200, 200, start, end);
                ctx.closePath();
                ctx.fillStyle = segments[i].color;
                ctx.fill();
                ctx.strokeStyle = 'white';
                ctx.lineWidth = 2;
                ctx.stroke();
                ctx.save();
                ctx.translate(200, 200);
                ctx.rotate(start + angle/2);
                ctx.fillStyle = 'white';
                ctx.font = 'bold 18px Arial';
                ctx.shadowColor = 'black';
                ctx.shadowBlur = 4;
                ctx.fillText(segments[i].multiplier + 'x', 130, 10);
                ctx.restore();
            }
        }

        document.querySelectorAll('.bet-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.bet-btn').forEach(b => b.classList.remove('selected'));
                this.classList.add('selected');
                currentBet = parseInt(this.dataset.bet);
                currentBetEl.textContent = currentBet;
            });
        });

        document.getElementById('setCustomBet').addEventListener('click', function() {
            const input = document.getElementById('customBet');
            const value = parseInt(input.value);
            if (value && value >= 10 && value <= balance) {
                currentBet = value;
                currentBetEl.textContent = currentBet;
                input.value = '';
                document.querySelectorAll('.bet-btn').forEach(b => b.classList.remove('selected'));
            } else {
                alert('Ставка от 10 до ' + balance);
            }
        });

        function getRandomSegment() {
            const totalWeight = segments.reduce((sum, seg) => sum + seg.weight, 0);
            let rand = Math.random() * totalWeight;
            for (let i = 0; i < segments.length; i++) {
                if (rand < segments[i].weight) return { index: i, segment: segments[i] };
                rand -= segments[i].weight;
            }
            return { index: 0, segment: segments[0] };
        }

        spinBtn.addEventListener('click', function() {
            if (isSpinning) return;
            if (currentBet > balance) { alert('Недостаточно средств!'); return; }
            
            isSpinning = true;
            spinBtn.disabled = true;
            resultEl.innerHTML = '';
            resultEl.className = 'result';
            
            balance -= currentBet;
            balanceEl.textContent = balance;
            
            const { index, segment } = getRandomSegment();
            
            const spins = 5;
            const targetAngle = (index / segments.length) * Math.PI * 2;
            const startAngle = 0;
            const finalAngle = startAngle + (spins * Math.PI * 2) + targetAngle;
            const startTime = performance.now();
            const duration = 3000;
            
            function animate(currentTime) {
                const elapsed = currentTime - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const easeOut = 1 - Math.pow(1 - progress, 3);
                const currentAngle = startAngle + (finalAngle - startAngle) * easeOut;
                drawWheel(currentAngle);
                
                if (progress < 1) {
                    requestAnimationFrame(animate);
                } else {
                    const win = Math.floor(currentBet * segment.multiplier);
                    if (segment.multiplier > 0) {
                        balance += win;
                        resultEl.className = 'result win';
                        resultEl.innerHTML = `🎉 ВЫИГРЫШ: $${win}`;
                    } else {
                        resultEl.className = 'result lose';
                        resultEl.innerHTML = '😢 ПРОИГРЫШ';
                    }
                    balanceEl.textContent = balance;
                    
                    tg.sendData(JSON.stringify({
                        action: 'game_result',
                        game: 'wheel',
                        bet: currentBet,
                        multiplier: segment.multiplier,
                        win: win,
                        newBalance: balance
                    }));
                    
                    isSpinning = false;
                    spinBtn.disabled = false;
                }
            }
            requestAnimationFrame(animate);
        });

        drawWheel();
        document.querySelector('.bet-btn[data-bet="50"]').classList.add('selected');
    </script>
</body>
</html>
